name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Verify Cpp SDK
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Guard canonical naming
        run: python3 scripts/check_repository_policy.py

      - name: Check formatting
        run: |
          mapfile -t sources < <(find include src tests -type f \( -name '*.cpp' -o -name '*.hpp' \) -print)
          clang-format --dry-run --Werror "${sources[@]}"

      - name: Configure
        run: >-
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DMISSIONWEAVEPROTOCOL_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Install
        run: cmake --install build --prefix "${RUNNER_TEMP}/missionweaveprotocol"

      - name: Smoke-test installed package
        run: |
          cmake -S tests/package-consumer -B build/consumer -G Ninja \
            -DCMAKE_PREFIX_PATH="${RUNNER_TEMP}/missionweaveprotocol"
          cmake --build build/consumer
          build/consumer/consumer
